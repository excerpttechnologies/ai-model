# Nginx config for Testi Student Assessment Platform
# Place this file at: /etc/nginx/sites-available/testi
# Then: sudo ln -s /etc/nginx/sites-available/testi /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain or server IP

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ── Frontend (React static build) ───────────────────────────────────────
    root /var/www/testi/dist;
    index index.html;

    # React Router — serve index.html for all unknown paths (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend API proxy ────────────────────────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding to uvicorn
        rewrite ^/api/(.*) /$1 break;

        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── SSE / streaming support ──────────────────────────────────────────
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}

